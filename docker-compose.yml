services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: competescope
      POSTGRES_PASSWORD: competescope
      POSTGRES_DB: competescope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competescope -d competescope"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install uv && uv sync && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      COMPETESCOPE_DATABASE_URL: postgresql+psycopg://competescope:competescope@postgres:5432/competescope
      COMPETESCOPE_REDIS_URL: redis://redis:6379/0
      COMPETESCOPE_QDRANT_URL: http://qdrant:6333
      COMPETESCOPE_LLM_API_KEY: ${COMPETESCOPE_LLM_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      COMPETESCOPE_LLM_BASE_URL: ${COMPETESCOPE_LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      COMPETESCOPE_SERPER_API_KEY: ${COMPETESCOPE_SERPER_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      COMPETESCOPE_BRAVE_SEARCH_API_KEY: ${COMPETESCOPE_BRAVE_SEARCH_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      COMPETESCOPE_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      INTERNAL_API_BASE_URL: http://backend:8000
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
